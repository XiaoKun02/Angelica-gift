<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una canzone per te... 🎵</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #ff3a3a; /* Rosso tipico dell'app musicale come tocco di stile */
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.5px; }
    </style>
    <script>
        // Elenco dei deep link delle canzoni
        const canzoni = [
            "orpheus://song/3324822346/?/autoplay=1",       // 玲子4.0
            "orpheus://song/2719561264/?/autoplay=1",       // No Complains
            "orpheus://song/2063131354/?/autoplay=1",         // 你的
            "orpheus://song/533259686/?/autoplay=1",       // 病变
            "orpheus://song/3358576770/?/autoplay=1",      // 正当生意
        ];

        window.onload = function() {
            // Sceglie una canzone a caso dall'elenco
            const linkCasuale = canzoni[Math.floor(Math.random() * canzoni.length)];
            
            // Forza l'apertura immediata dell'applicazione musicale
            window.location.href = linkCasuale;
        };
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <h1>Scegliendo la traccia perfetta... 🎧</h1>
    </div>
</body>
</html>
