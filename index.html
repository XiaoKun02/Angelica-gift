<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un regalo musicale per te 🎵</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1rem;
            color: #b3b3b3;
            margin-bottom: 40px;
        }

        /* Il pulsante a forma di vinile */
        .vinyl-button {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #282828 40%, #1a1a1a 41%, #000000 70%);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            animation: spin 6s linear infinite;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Effetto pressione sul vinile */
        .vinyl-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* Il centro del vinile (Etichetta rossa) */
        .vinyl-center {
            width: 60px;
            height: 60px;
            background-color: #ff3a3a; /* Rosso NetEase */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Il foro centrale del disco */
        .vinyl-hole {
            width: 10px;
            height: 10px;
            background-color: #121212;
            border-radius: 50%;
        }

        /* Animazione della rotazione del vinile */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .note-icon {
            font-size: 2rem;
            margin-top: 30px;
            opacity: 0.6;
        }
    </style>
